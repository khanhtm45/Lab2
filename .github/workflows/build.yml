name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build
        working-directory: journal_trend_analyzer
        run: |
          flutter pub get
          flutter analyze
          flutter test --coverage

      # SonarScanner CLI (not the Docker scan action) so Flutter/Dart dependencies stay visible to analysis.
      - name: SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $version = "6.2.1.4610"
          $sonarDir = "$env:USERPROFILE\.sonar"
          $scannerHome = "$sonarDir\sonar-scanner-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $sonarDir | Out-Null
          $zip = "$sonarDir\sonar-scanner.zip"
          Invoke-WebRequest -Uri "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$version-windows-x64.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $sonarDir -Force
          $env:PATH = "$scannerHome\bin;$env:PATH"
          # Do not pass -D... on pwsh: PowerShell treats -D as its own flag.
          sonar-scanner
        shell: pwsh
