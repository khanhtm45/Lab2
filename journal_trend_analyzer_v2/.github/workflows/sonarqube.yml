name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash
        working-directory: ./journal_trend_analyzer_v2  # ✅ Set working directory
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Debug - Show environment
        run: |
          echo "=== Environment Debug ==="
          echo "Runner OS: ${{ runner.os }}"
          echo "Workspace: ${{ github.workspace }}"
          echo "Repository: ${{ github.repository }}"
          echo "Working directory: $(pwd)"
          echo ""
          echo "=== Root Directory Contents ==="
          cd ${{ github.workspace }}
          ls -la
          echo ""
          echo "=== Flutter Project Directory ==="
          cd journal_trend_analyzer_v2
          ls -la
          echo ""
          echo "=== Pubspec.yaml ==="
          cat pubspec.yaml | head -10
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true
      
      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze code
        run: flutter analyze
      
      - name: Run tests (optional)
        run: flutter test --coverage || true
        continue-on-error: true
      
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: journal_trend_analyzer_v2
          args: >
            -Dsonar.projectKey=journal_trend_analyzer_v2
            -Dsonar.sources=lib
            -Dsonar.tests=test,integration_test
            -Dsonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/generated/**,**/.dart_tool/**,**/build/**
            -Dsonar.test.exclusions=**/*_test.dart
