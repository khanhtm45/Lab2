# =====================================
# SonarQube Configuration for Flutter
# =====================================

# Project identification
sonar.projectKey=journal_trend_analyzer_v2
sonar.projectName=Journal Trend Analyzer V2
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=lib
sonar.tests=test,integration_test

# Language
sonar.language=dart

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/generated/**,**/.dart_tool/**,**/build/**,**/android/**,**/ios/**,**/windows/**,**/linux/**,**/macos/**,**/web/**

# Test exclusions
sonar.test.exclusions=**/*_test.dart

# Coverage (if using coverage tool)
# sonar.dart.coverage.reportPaths=coverage/lcov.info

# Duplication exclusions
sonar.cpd.exclusions=**/*_screen.dart,**/*_widget.dart
