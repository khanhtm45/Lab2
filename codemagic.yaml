# Codemagic CI — JournalAI (PRM393 Lab 2)
# Repo layout: Flutter app lives in journal_trend_analyzer/
#
# Setup in Codemagic UI (one time):
# 1. Teams → Personal Account → Integrations → Apple Developer Portal (API key)
# 2. Code signing identities → iOS → add certificate / enable automatic signing
# 3. Push this file, then click "Check for configuration file"
#
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/

workflows:
  journalai-ios:
    name: JournalAI iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: journal_trend_analyzer

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: com.example.lab2
      vars:
        BUNDLE_ID: com.example.lab2
        # Optional: add OPENALEX_API_KEY in Codemagic UI → Environment variables

    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Run analyzer
        script: |
          flutter analyze lib

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

